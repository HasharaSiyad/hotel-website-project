<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Ella Heritage</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #fdfaf5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .thank-you-card {
            background: white;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 500px;
        }
        .icon { font-size: 50px; color: #b8926a; margin-bottom: 20px; }
        h1 { color: #1a1a1a; text-transform: uppercase; letter-spacing: 2px; }
        p { color: #555; line-height: 1.6; }
        .back-btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background-color: #b8926a;
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.3s;
        }
        .back-btn:hover { background-color: #1a1a1a; }
    </style>
</head>
<body>

<div class="thank-you-card">
    <div class="icon">🌿</div>
    <h1>Thank You!</h1>
    <p>Your message has been received. Our team at <strong>Ella Heritage</strong> will review your details and get back to you at the email address provided shortly.</p>
    <a href="index.html" class="back-btn">Back to Home</a>
</div>

</body>
</html>
